name: Build Obsidian Vault

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-vault:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build Obsidian vault
        run: |
          mkdir -p dist
          python ./scripts/build_obsidian_vault.py --output-root ./dist/dist-vault --zip-path ./dist/solus-obsidian-vault.zip

      - name: Upload vault artifact
        uses: actions/upload-artifact@v4
        with:
          name: solus-obsidian-vault
          path: ./dist/solus-obsidian-vault.zip
          if-no-files-found: error

      - name: Publish rolling prerelease
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: obsidian-preview
          name: Obsidian Preview
          prerelease: true
          files: ./dist/solus-obsidian-vault.zip
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: false
          body: Latest Obsidian-ready vault package built from main.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}